name: Update Cost Plus availability
on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run checker
        run: python check.py
      - name: Save results
        run: |
          git config user.name "availability-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Update availability" || echo "no changes"
          git push
